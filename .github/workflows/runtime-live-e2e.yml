# SECURITY MODEL — read before editing.
#
# This workflow runs under `pull_request_target`, which means it executes in the
# base-branch context with repository secrets available, even for fork PRs.
# Fork-PR code is checked out via `ref: github.event.pull_request.head.sha` so
# the tests actually validate the PR head, not main.
#
# The env-approval gate is the ONLY protection against malicious PR code
# running with secrets. Each job uses an `environment:` with required reviewers
# (CI-E2E, CI-E2E-OPUS, CI-E2E-CODEX). Every run pauses in `waiting` until a
# maintainer approves the deployment.
#
# Maintainers: review the head SHA's code BEFORE approving the env deployment.
# If the diff looks malicious, refuse approval — secrets never reach bad code.
# `persist-credentials: false` on checkout prevents GITHUB_TOKEN persistence in
# `.git/config` so post-checkout steps cannot use it. Workflow-level
# `permissions:` narrows the default token surface to read-only.

name: Runtime Live E2E

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      claude_version:
        description: "Pin Claude Code to a specific version (e.g. 2.1.107, stable, latest). Empty = installer default."
        required: false
        type: string
        default: ""
      test_selector:
        description: "Pytest nodeid or path to run instead of the full make target (e.g. tests/test_foo.py::test_bar). Empty = full make target."
        required: false
        type: string
        default: ""
      effort_override:
        description: "Override --effort passed to pytest (e.g. low, high, xhigh). Only applied when test_selector is set. Empty = no --effort flag."
        required: false
        type: string
        default: ""
      model_override:
        description: "Override --model passed to pytest for Claude jobs (e.g. claude-opus-4-6, opus, sonnet). Substitutes the job's default. No-op on codex-live. Empty = preserve per-job default."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: read

jobs:
  # Gate job: static suite must pass before any live-e2e job burns env-approval.
  # Duplicate of the standalone Static CI workflow (ci-static.yml); intentional
  # redundancy lets the live-e2e jobs `needs:` it natively without cross-workflow
  # orchestration. The standalone workflow stays for the top-level PR status card.
  static-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Run offline static suite
        run: make test-static

  claude-live:
    needs: static-offline
    runs-on: ubuntu-latest
    environment:
      name: CI-E2E
      deployment: false
    env:
      DISABLE_AUTOUPDATER: "1"
      KEEP_TEST_DIR: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
    steps:
      - name: Check required secret
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "ANTHROPIC_API_KEY is required for claude-live." >&2
            exit 1
          fi

      - name: Load PR provenance
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const pull = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: pull.number,
              per_page: 100,
            });

            const approvers = [...new Set(
              reviews
                .filter((review) => review.state === "APPROVED" && review.user?.login)
                .map((review) => review.user.login)
            )];
            const sameRepo = pull.head.repo?.full_name === pull.base.repo?.full_name;

            await core.summary
              .addHeading("Runtime Live E2E Provenance")
              .addRaw(`- Trigger source: pull_request_target\n`)
              .addRaw(`- PR number: #${pull.number}\n`)
              .addRaw(`- Base SHA: \`${pull.base.sha}\`\n`)
              .addRaw(`- PR head SHA (checked out): \`${pull.head.sha}\`\n`)
              .addRaw(`- Branch source: ${sameRepo ? "same-repo" : `fork (${pull.head.repo?.full_name ?? "unknown"})`}\n`)
              .addRaw(`- Approval context: ${approvers.length ? approvers.join(", ") : "none recorded"}\n`)
              .write();

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@v6

      - name: Prepare live artifact root
        run: |
          mkdir -p "$RUNNER_TEMP/spacedock-live/$GITHUB_JOB"
          echo "SPACEDOCK_TEST_TMP_ROOT=$RUNNER_TEMP/spacedock-live/$GITHUB_JOB" >> "$GITHUB_ENV"

      - name: Install Claude Code
        env:
          CLAUDE_VERSION: ${{ inputs.claude_version }}
        run: |
          if [ -n "$CLAUDE_VERSION" ]; then
            echo "Installing pinned Claude Code version: $CLAUDE_VERSION"
            curl -fsSL https://claude.ai/install.sh | bash -s -- "$CLAUDE_VERSION"
          else
            echo "Installing latest Claude Code (no pin)"
            curl -fsSL https://claude.ai/install.sh | bash
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

      - name: Show tool versions
        env:
          CLAUDE_VERSION: ${{ inputs.claude_version }}
          MODEL_OVERRIDE: ${{ inputs.model_override }}
        run: |
          CLAUDE_VERSION_OUT=$(claude --version)
          UV_VERSION_OUT=$(uv --version)
          echo "$CLAUDE_VERSION_OUT"
          echo "$UV_VERSION_OUT"
          if [ -n "$MODEL_OVERRIDE" ]; then
            EFFECTIVE_MODEL="$MODEL_OVERRIDE"
          else
            EFFECTIVE_MODEL="(pytest default — haiku)"
          fi
          {
            echo "### Tool versions"
            if [ -n "$CLAUDE_VERSION" ]; then
              echo "- Claude Code pin requested: \`$CLAUDE_VERSION\`"
            else
              echo "- Claude Code pin requested: _none (installer default)_"
            fi
            echo "- Installed \`claude --version\`: \`$CLAUDE_VERSION_OUT\`"
            echo "- Installed \`uv --version\`: \`$UV_VERSION_OUT\`"
            echo "- Effective model: \`$EFFECTIVE_MODEL\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Claude live suite
        env:
          TEST_SELECTOR: ${{ inputs.test_selector }}
          EFFORT_OVERRIDE: ${{ inputs.effort_override }}
          MODEL_OVERRIDE: ${{ inputs.model_override }}
        run: |
          if [ -n "$TEST_SELECTOR" ]; then
            echo "Running selector: $TEST_SELECTOR"
            EFFORT_ARGS=()
            if [ -n "$EFFORT_OVERRIDE" ]; then
              EFFORT_ARGS=(--effort "$EFFORT_OVERRIDE")
            fi
            MODEL_ARGS=()
            if [ -n "$MODEL_OVERRIDE" ]; then
              MODEL_ARGS=(--model "$MODEL_OVERRIDE")
            fi
            unset CLAUDECODE
            uv run pytest "$TEST_SELECTOR" --runtime claude "${MODEL_ARGS[@]}" "${EFFORT_ARGS[@]}" -v
          else
            make test-live-claude
          fi

      - name: Upload Claude live artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-live-e2e-claude-live
          path: ${{ runner.temp }}/spacedock-live/${{ github.job }}
          if-no-files-found: warn

  claude-live-bare:
