name: Runtime Live E2E

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Approved PR number to validate with the live runtime suite"
        required: true
        type: string
      claude_version:
        description: "Pin Claude Code to a specific version (e.g. 2.1.107, stable, latest). Empty = installer default."
        required: false
        type: string
        default: ""
      test_selector:
        description: "Pytest nodeid or path to run instead of the full make target (e.g. tests/test_foo.py::test_bar). Empty = full make target."
        required: false
        type: string
        default: ""
      effort_override:
        description: "Override --effort passed to pytest (e.g. low, high, xhigh). Only applied when test_selector is set. Empty = no --effort flag."
        required: false
        type: string
        default: ""
      model_override:
        description: "Override --model passed to pytest for Claude jobs (e.g. claude-opus-4-6, opus, sonnet). Substitutes the job's default. No-op on codex-live. Empty = preserve per-job default."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: read

jobs:
  claude-live:
    runs-on: ubuntu-latest
    environment:
      name: CI-E2E
      deployment: false
    env:
      DISABLE_AUTOUPDATER: "1"
      KEEP_TEST_DIR: "1"
      TRIGGER_SOURCE: ${{ github.event_name }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
    steps:
      - name: Check required secret
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "ANTHROPIC_API_KEY is required for claude-live." >&2
            exit 1
          fi

      - name: Load PR provenance
        uses: actions/github-script@v7
        with:
          script: |
            const triggerSource = process.env.TRIGGER_SOURCE;
            let rawPrNumber;

            if (triggerSource === "pull_request") {
              rawPrNumber = process.env.PR_NUMBER;
            } else if (triggerSource === "workflow_dispatch") {
              rawPrNumber = process.env.DISPATCH_PR_NUMBER;
            } else {
              core.setFailed(`Unsupported trigger source: ${JSON.stringify(triggerSource)}`);
              return;
            }

            const prNumber = Number(rawPrNumber);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`${triggerSource} PR number must be a positive integer, got ${JSON.stringify(rawPrNumber)}`);
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const approvers = [...new Set(
              reviews
                .filter((review) => review.state === "APPROVED" && review.user?.login)
                .map((review) => review.user.login)
            )];
            const sameRepo = pull.head.repo?.full_name === pull.base.repo?.full_name;

            await core.summary
              .addHeading("Runtime Live E2E Provenance")
              .addRaw(`- Trigger source: ${triggerSource}\n`)
              .addRaw(`- PR number: #${prNumber}\n`)
              .addRaw(`- Tested workflow SHA: \`${context.sha}\`\n`)
              .addRaw(`- Current PR head SHA: \`${pull.head.sha}\`\n`)
              .addRaw(`- Branch source: ${sameRepo ? "same-repo" : `fork (${pull.head.repo?.full_name ?? "unknown"})`}\n`)
              .addRaw(`- Approval context: ${approvers.length ? approvers.join(", ") : "none recorded"}\n`)
              .write();

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@v6

      - name: Prepare live artifact root
        run: |
          mkdir -p "$RUNNER_TEMP/spacedock-live/$GITHUB_JOB"
          echo "SPACEDOCK_TEST_TMP_ROOT=$RUNNER_TEMP/spacedock-live/$GITHUB_JOB" >> "$GITHUB_ENV"

      - name: Install Claude Code
        env:
          CLAUDE_VERSION: ${{ inputs.claude_version }}
        run: |
          if [ -n "$CLAUDE_VERSION" ]; then
            echo "Installing pinned Claude Code version: $CLAUDE_VERSION"
            curl -fsSL https://claude.ai/install.sh | bash -s -- "$CLAUDE_VERSION"
          else
            echo "Installing latest Claude Code (no pin)"
            curl -fsSL https://claude.ai/install.sh | bash
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

      - name: Show tool versions
        env:
          CLAUDE_VERSION: ${{ inputs.claude_version }}
        run: |
          CLAUDE_VERSION_OUT=$(claude --version)
          UV_VERSION_OUT=$(uv --version)
          echo "$CLAUDE_VERSION_OUT"
          echo "$UV_VERSION_OUT"
          {
            echo "### Tool versions"
            if [ -n "$CLAUDE_VERSION" ]; then
              echo "- Claude Code pin requested: \`$CLAUDE_VERSION\`"
            else
              echo "- Claude Code pin requested: _none (installer default)_"
            fi
            echo "- Installed \`claude --version\`: \`$CLAUDE_VERSION_OUT\`"
            echo "- Installed \`uv --version\`: \`$UV_VERSION_OUT\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Claude live suite
        env:
          TEST_SELECTOR: ${{ inputs.test_selector }}
          EFFORT_OVERRIDE: ${{ inputs.effort_override }}
        run: |
          if [ -n "$TEST_SELECTOR" ]; then
            echo "Running selector: $TEST_SELECTOR"
            EFFORT_ARGS=()
            if [ -n "$EFFORT_OVERRIDE" ]; then
              EFFORT_ARGS=(--effort "$EFFORT_OVERRIDE")
            fi
            unset CLAUDECODE
            uv run pytest "$TEST_SELECTOR" --runtime claude "${EFFORT_ARGS[@]}" -v
          else
            make test-live-claude
          fi

      - name: Upload Claude live artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-live-e2e-claude-live
          path: ${{ runner.temp }}/spacedock-live/${{ github.job }}
          if-no-files-found: warn

