              .addRaw(`- Approval context: ${approvers.length ? approvers.join(", ") : "none recorded"}\n`)
              .write();

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@v6

      - name: Prepare live artifact root
        run: |
          mkdir -p "$RUNNER_TEMP/spacedock-live/$GITHUB_JOB"
          echo "SPACEDOCK_TEST_TMP_ROOT=$RUNNER_TEMP/spacedock-live/$GITHUB_JOB" >> "$GITHUB_ENV"

      - name: Install Claude Code
        env:
          CLAUDE_VERSION: ${{ inputs.claude_version }}
        run: |
          if [ -n "$CLAUDE_VERSION" ]; then
            echo "Installing pinned Claude Code version: $CLAUDE_VERSION"
            curl -fsSL https://claude.ai/install.sh | bash -s -- "$CLAUDE_VERSION"
          else
            echo "Installing latest Claude Code (no pin)"
            curl -fsSL https://claude.ai/install.sh | bash
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

      - name: Show tool versions
        env:
          CLAUDE_VERSION: ${{ inputs.claude_version }}
          MODEL_OVERRIDE: ${{ inputs.model_override }}
        run: |
          CLAUDE_VERSION_OUT=$(claude --version)
          UV_VERSION_OUT=$(uv --version)
          echo "$CLAUDE_VERSION_OUT"
          echo "$UV_VERSION_OUT"
          if [ -n "$MODEL_OVERRIDE" ]; then
            EFFECTIVE_MODEL="$MODEL_OVERRIDE"
          else
            # Pinned to claude-opus-4-6 due to opus-4-7 ensign hallucination regression at low/medium effort; see #177 / #181. Reversible — restore default to opus once upstream resolves.
            EFFECTIVE_MODEL="claude-opus-4-6"
          fi
          {
            echo "### Tool versions"
            if [ -n "$CLAUDE_VERSION" ]; then
              echo "- Claude Code pin requested: \`$CLAUDE_VERSION\`"
            else
              echo "- Claude Code pin requested: _none (installer default)_"
            fi
            echo "- Installed \`claude --version\`: \`$CLAUDE_VERSION_OUT\`"
            echo "- Installed \`uv --version\`: \`$UV_VERSION_OUT\`"
            echo "- Effective model: \`$EFFECTIVE_MODEL\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Claude live suite (opus)
        env:
          TEST_SELECTOR: ${{ inputs.test_selector }}
          EFFORT_OVERRIDE: ${{ inputs.effort_override }}
          MODEL_OVERRIDE: ${{ inputs.model_override }}
        run: |
          if [ -n "$MODEL_OVERRIDE" ]; then
            MODEL_FLAG="$MODEL_OVERRIDE"
          else
            # Pinned to claude-opus-4-6 due to opus-4-7 ensign hallucination regression at low/medium effort; see #177 / #181. Reversible — restore default to opus once upstream resolves.
            MODEL_FLAG="claude-opus-4-6"
          fi
          if [ -n "$TEST_SELECTOR" ]; then
            echo "Running selector: $TEST_SELECTOR"
            if [ -n "$EFFORT_OVERRIDE" ]; then
              EFFORT_FLAG="$EFFORT_OVERRIDE"
            else
              EFFORT_FLAG="low"
            fi
            echo "Opus effort: $EFFORT_FLAG"
            echo "Opus model: $MODEL_FLAG"
            unset CLAUDECODE
            uv run pytest "$TEST_SELECTOR" --runtime claude --model "$MODEL_FLAG" --effort "$EFFORT_FLAG" -v
          else
            # Propagate the pinned/overridden model to the make target's OPUS_MODEL var so the no-selector path also picks up claude-opus-4-6 (or the override). See #177 / #181.
            echo "Opus model: $MODEL_FLAG"
            make test-live-claude-opus OPUS_MODEL="$MODEL_FLAG"
          fi

      - name: Upload Claude live opus artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-live-e2e-claude-live-opus
          path: ${{ runner.temp }}/spacedock-live/${{ github.job }}
          if-no-files-found: warn

