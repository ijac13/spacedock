      - name: Show tool versions
        run: |
          codex --version
          uv --version

      - name: Run Codex live suite
        env:
          TEST_SELECTOR: ${{ inputs.test_selector }}
          EFFORT_OVERRIDE: ${{ inputs.effort_override }}
          MODEL_OVERRIDE: ${{ inputs.model_override }}
        run: |
          if [ -n "$MODEL_OVERRIDE" ]; then
            echo "Note: model_override ignored for codex-live (Codex uses its own model-selection path)."
          fi
          if [ -n "$TEST_SELECTOR" ]; then
            echo "Running selector: $TEST_SELECTOR"
            EFFORT_ARGS=()
            if [ -n "$EFFORT_OVERRIDE" ]; then
              EFFORT_ARGS=(--effort "$EFFORT_OVERRIDE")
            fi
            uv run python scripts/run_pytest_tier.py --allow-no-tests -- \
              uv run pytest "$TEST_SELECTOR" --runtime codex "${EFFORT_ARGS[@]}" -v
          else
            make test-live-codex
          fi

      - name: Upload Codex live artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-live-e2e-codex-live
          path: ${{ runner.temp }}/spacedock-live/${{ github.job }}
          if-no-files-found: warn
