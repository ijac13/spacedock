            fi
            unset CLAUDECODE CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
            uv run pytest "$TEST_SELECTOR" --runtime claude --team-mode=bare "${MODEL_ARGS[@]}" "${EFFORT_ARGS[@]}" -v
          else
