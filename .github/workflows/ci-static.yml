name: Static CI

on:
  pull_request:
    branches:
      - main

jobs:
  static-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Run offline static suite
        run: make test-static
